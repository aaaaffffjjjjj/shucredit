<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海大学培养方案解析器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #e8e8ff;
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .upload-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 14px;
        }

        #file {
            display: none;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .btn-upload:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 14px;
        }

        .features {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .features ul {
            list-style: none;
            color: #666;
            font-size: 14px;
        }

        .features li {
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
        }

        .features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #27ae60;
        }

        .selected-file {
            margin-top: 15px;
            padding: 10px 20px;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 上海大学培养方案解析器</h1>
        <p class="subtitle">上传PDF或Excel文件，智能解析培养方案，一键导入数据库</p>

        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击或拖拽文件到此处</div>
                <div class="upload-hint">支持 .pdf, .xlsx, .xls 格式，文件大小不超过10MB</div>
                <input type="file" id="file" name="file" accept=".pdf,.xlsx,.xls">
            </div>
            <div id="selectedFileInfo"></div>
            <button type="submit" class="btn-upload" id="uploadBtn" disabled>
                🔄 开始解析
            </button>
        </form>

        {% if error %}
            <div class="error">❌ {{ error }}</div>
        {% endif %}

        <div class="features">
            <h3>✨ 功能特点</h3>
            <ul>
                <li>从PDF或Excel真正解析模块名称和学分</li>
                <li>智能识别学院和专业名称</li>
                <li>保持与现有数据库结构的兼容性</li>
                <li>支持预览和编辑后再导入</li>
                <li>自动去重，避免重复数据</li>
            </ul>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('file');
        const uploadBtn = document.getElementById('uploadBtn');
        const selectedFileInfo = document.getElementById('selectedFileInfo');
        const uploadForm = document.getElementById('uploadForm');

        let selectedFileName = '';

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                const ext = file.name.toLowerCase().split('.').pop();
                if (['pdf', 'xlsx', 'xls'].includes(ext)) {
                    fileInput.files = files;
                    selectedFileName = file.name;
                    uploadBtn.disabled = false;
                    updateSelectedFileDisplay(file.name);
                } else {
                    alert('请上传PDF或Excel文件');
                }
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                selectedFileName = fileInput.files[0].name;
                uploadBtn.disabled = false;
                updateSelectedFileDisplay(fileInput.files[0].name);
            }
        });

        function updateSelectedFileDisplay(fileName) {
            selectedFileInfo.innerHTML = `<div class="selected-file">✅ 已选择: ${fileName}</div>`;
        }

        uploadForm.addEventListener('submit', (e) => {
            if (!selectedFileName) {
                e.preventDefault();
                alert('请先选择文件');
            }
        });
    </script>
</body>
</html>
