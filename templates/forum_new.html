{% extends "base.html" %}
{% from "macros.html" import flash_messages %}
{% block title %}发帖{% endblock %}
{% block body %}
<div class="page">
    <div class="card">
        <h1>发布新帖</h1>
        <p class="meta"><a href="{{ url_for('forum_index') }}">返回论坛</a></p>
        {{ flash_messages() }}
        <form method="post">
            <div class="form-row">
                <label for="title">标题</label>
                <input type="text" id="title" name="title" required style="width:100%;">
            </div>
            <div class="form-row">
                <label for="body">内容（纯文本）</label>
                <textarea id="body" name="body" rows="8" required
                    style="width:100%;font-family:inherit;padding:12px;border:1px solid var(--border);border-radius:12px;"></textarea>
            </div>
            <button type="submit" class="btn">发布</button>
        </form>
    </div>
</div>
{% endblock %}
