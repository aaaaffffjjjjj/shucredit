<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学分太阳系</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020308; font-family: 'Open Sans', sans-serif; }
    #container { width: 100%; height: 100%; position: relative; }
    #loading-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(2, 3, 8, 0.98); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 1000;
    }
    .loading-text { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 10px; }
    #solar-tooltip {
      position: fixed; background: rgba(5, 8, 15, 0.95); backdrop-filter: blur(12px);
      border: 1px solid rgba(50, 70, 150, 0.4); border-radius: 8px;
      padding: 10px 14px; color: rgba(255,255,255,0.9); font-size: 12px;
      pointer-events: none; z-index: 9999; display: none;
      max-width: 260px; box-shadow: 0 4px 25px rgba(0,0,0,0.7);
    }
    #controls {
      position: fixed; bottom: 35px; left: 0; width: 100%; height: 50px;
      background: rgba(5, 8, 15, 0.85); backdrop-filter: blur(15px);
      border-top: 1px solid rgba(100, 120, 200, 0.15);
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
      z-index: 100;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #module-buttons { display: flex; gap: 8px; }
    .module-btn {
      padding: 4px 12px; background: rgba(50, 70, 150, 0.2);
      border: 1px solid rgba(80, 100, 200, 0.3); border-radius: 20px;
      color: rgba(255,255,255,0.85); font-size: 12px; cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .module-btn:hover, .module-btn.active {
      background: rgba(70, 90, 180, 0.5); border-color: rgba(100, 130, 220, 0.6);
    }
    #back-btn {
      padding: 5px 12px; background: rgba(180, 60, 60, 0.25);
      border: 1px solid rgba(200, 80, 80, 0.4); border-radius: 16px;
      color: rgba(255,255,255,0.85); font-size: 12px; cursor: pointer;
      display: none;
    }
    #back-btn:hover { background: rgba(180, 60, 60, 0.45); }
    #credits-btn {
      margin-left: auto; padding: 4px 12px; background: rgba(50, 70, 150, 0.2);
      border: 1px solid rgba(80, 100, 200, 0.3); border-radius: 20px;
      color: rgba(255,255,255,0.85); font-size: 12px; cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #credits-btn:hover { background: rgba(70, 90, 180, 0.5); }
    #timeline-slider-container {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 35px;
      background: rgba(5, 8, 15, 0.9); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center; gap: 15px;
      z-index: 99;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #timeline-slider { width: 300px; height: 5px; cursor: pointer; border-radius: 3px; }
    #semester-label { color: rgba(255,255,255,0.8); font-size: 12px; }
    #course-modal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(5, 8, 18, 0.96); backdrop-filter: blur(15px);
      border: 1px solid rgba(60, 80, 160, 0.4); border-radius: 12px;
      padding: 20px; width: 400px; max-height: 60vh; overflow-y: auto;
      z-index: 1001; display: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    #course-modal.show { display: block; }
    #module-info-modal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(5, 8, 18, 0.96); backdrop-filter: blur(15px);
      border: 1px solid rgba(60, 80, 160, 0.4); border-radius: 12px;
      padding: 20px; width: 420px; max-height: 70vh; overflow-y: auto;
      z-index: 1001; display: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    #module-info-modal.show { display: block; }
    #credits-detail-modal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(5, 8, 18, 0.96); backdrop-filter: blur(15px);
      border: 1px solid rgba(60, 80, 160, 0.4); border-radius: 12px;
      padding: 20px; width: 500px; max-height: 75vh; overflow-y: auto;
      z-index: 1001; display: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    #credits-detail-modal.show { display: block; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .modal-title { color: #fff; font-size: 16px; font-weight: 600; }
    .modal-close {
      background: none; border: none; color: #fff; font-size: 20px;
      cursor: pointer; opacity: 0.7; transition: opacity 0.3s;
    }
    .modal-close:hover { opacity: 1; }
    .course-item {
      padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 13px;
    }
    .course-item:last-child { border-bottom: none; }
    .course-name { font-weight: 500; }
    .course-credit { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 4px; }
    .empty-state { color: rgba(255,255,255,0.5); text-align: center; padding: 20px; }
    .hidden { display: none !important; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/dist/tween.umd.js"></script>
</head>
<body>
  <div id="container">
    <div id="loading-screen">
      <div class="loading-text">加载数据...</div>
    </div>
    <div id="solar-tooltip"></div>
  </div>
  
  <div id="controls">
    <div id="module-buttons"></div>
    <button id="back-btn" onclick="resetView()">返回全景</button>
    <button id="credits-btn" onclick="openCreditsDetailModal()">📊 学分详情</button>
  </div>

  <div id="course-modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">未修课程</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="empty-state">加载中...</div>
    </div>
  </div>

  <div id="module-info-modal">
    <div class="modal-header">
      <div class="modal-title" id="info-modal-title">模块详情</div>
      <button class="modal-close" onclick="closeInfoModal()">×</button>
    </div>
    <div class="modal-body" id="info-modal-body">
      <div class="empty-state">加载中...</div>
    </div>
  </div>
  
  <div id="credits-detail-modal">
    <div class="modal-header">
      <div class="modal-title" id="credits-modal-title">学分完成详情</div>
      <button class="modal-close" onclick="closeCreditsModal()">×</button>
    </div>
    <div class="modal-body" id="credits-modal-body">
      <div class="empty-state">加载中...</div>
    </div>
  </div>

  <script>
    const SEMESTER_LABELS = ['第1学期', '第2学期', '第3学期', '第4学期', '第5学期', '第6学期', '第7学期', '第8学期'];
    
    let container, scene, camera, renderer, controls, raycaster, mouse;
    let modulesById = {};
    let rootModules = [];
    let sunData = { required: 160, earned: 0 };
    let timePercent = 100;
    let focusedPlanet = null;
    let planets = [];
    let sunGroup, starField, satelliteGroup, connectionLines = [];
    let tooltip, moduleButtons;
    let animationTime = 0;

    function $(id) { return document.getElementById(id); }

    function lerpColor(c1, c2, t) {
      const a = new THREE.Color(c1);
      const b = new THREE.Color(c2);
      return a.lerp(b, t).getHex();
    }

    function planetColorByPercent(pct) {
      if (pct >= 80) return 0xf4c542;
      if (pct >= 40) return lerpColor(0x6c5ce7, 0xa463f5, (pct - 40) / 40);
      return lerpColor(0x2d1b4e, 0x5e2a84, pct / 40);
    }

    function satelliteColorByPercent(pct, parentColor) {
      if (!parentColor) {
        const baseColors = [0xf4c542, 0x7bed9f, 0xff9500, 0x8b3a62];
        if (pct >= 100) return baseColors[0];
        else if (pct >= 50) return baseColors[1];
        else if (pct > 0) return baseColors[2];
        else return baseColors[3];
      }
      
      const parentColorObj = new THREE.Color(parentColor);
      
      let brightnessOffset = 0;
      if (pct >= 100) brightnessOffset = 0.2;
      else if (pct >= 50) brightnessOffset = 0.1;
      else if (pct > 0) brightnessOffset = -0.05;
      else brightnessOffset = -0.15;
      
      const mixedColor = parentColorObj.clone();
      mixedColor.offsetHSL(
        (Math.random() - 0.5) * 0.08,
        (Math.random() - 0.5) * 0.1,
        brightnessOffset + (Math.random() - 0.5) * 0.15
      );
      
      return mixedColor.getHex();
    }

    function scaledModule(mod, scale01) {
      const earned = (mod.earned || 0) * scale01;
      const required = mod.required || 0;
      const percent = required > 0
        ? Math.min(100, Math.round((earned / required) * 1000) / 10)
        : 0;
      return { earned: Math.round(earned * 100) / 100, percent, remaining: Math.max(0, required - earned) };
    }

    function buildModuleMaps(modules) {
      modulesById = {};
      modules.forEach(m => { modulesById[m.id] = { ...m, children: [] }; });
      rootModules = [];
      modules.forEach(m => {
        if (!m.parent_id || m.parent_id === 0) {
          rootModules.push(modulesById[m.id]);
        } else if (modulesById[m.parent_id]) {
          modulesById[m.parent_id].children.push(m);
        }
      });
    }

    function createStarTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 16;
      canvas.height = 16;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
      gradient.addColorStop(0, '#ffffff');
      gradient.addColorStop(0.3, 'rgba(255,255,255,0.9)');
      gradient.addColorStop(0.6, 'rgba(255,255,255,0.3)');
      gradient.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 16, 16);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      return texture;
    }

    function createStarLayer(count, minRadius, maxRadius, size, opacity, speedFactor) {
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const phases = new Float32Array(count);
      const speeds = new Float32Array(count);
      
      for (let i = 0; i < count; i++) {
        const r = minRadius + Math.random() * (maxRadius - minRadius);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = (Math.random() - 0.5) * 60;
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
        
        const colorChoice = Math.random();
        let rIntensity, gIntensity, bIntensity;
        if (colorChoice > 0.9) {
          rIntensity = 1;
          gIntensity = 0.9 + Math.random() * 0.1;
          bIntensity = 0.7 + Math.random() * 0.2;
        } else if (colorChoice > 0.75) {
          rIntensity = 0.95 + Math.random() * 0.05;
          gIntensity = 0.9 + Math.random() * 0.1;
          bIntensity = 0.8 + Math.random() * 0.2;
        } else {
          rIntensity = 0.9 + Math.random() * 0.1;
          gIntensity = 0.85 + Math.random() * 0.1;
          bIntensity = 0.75 + Math.random() * 0.15;
        }
        colors[i * 3] = rIntensity;
        colors[i * 3 + 1] = gIntensity;
        colors[i * 3 + 2] = bIntensity;
        
        phases[i] = Math.random() * Math.PI * 2;
        speeds[i] = (0.3 + Math.random() * 0.7) * speedFactor;
      }
      
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
      geo.setAttribute('speed', new THREE.BufferAttribute(speeds, 1));
      
      const starTexture = createStarTexture();
      
      const mat = new THREE.PointsMaterial({
        size: size, vertexColors: true, transparent: true, opacity: opacity,
        sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending,
        map: starTexture, alphaMap: starTexture, alphaTest: 0.01
      });
      
      const points = new THREE.Points(geo, mat);
      points.userData.starData = { phases, speeds };
      return points;
    }
    
    function createStarField() {
      const group = new THREE.Group();
      
      const backLayer = createStarLayer(1500, 120, 200, 1.8, 0.8, 0.2);
      backLayer.renderOrder = -30;
      group.add(backLayer);
      
      const midBackLayer = createStarLayer(1200, 100, 150, 2.5, 0.9, 0.4);
      midBackLayer.renderOrder = -25;
      group.add(midBackLayer);
      
      const midLayer = createStarLayer(1000, 70, 120, 3.2, 1, 0.6);
      midLayer.renderOrder = -20;
      group.add(midLayer);
      
      const midFrontLayer = createStarLayer(800, 50, 90, 4, 1, 0.8);
      midFrontLayer.renderOrder = -15;
      group.add(midFrontLayer);
      
      const frontLayer = createStarLayer(500, 30, 60, 5, 1, 1.2);
      frontLayer.renderOrder = -10;
      group.add(frontLayer);
      
      group.userData.isStarField = true;
      return group;
    }

    function createSun() {
      const g = new THREE.Group();
      g.userData.isSunGroup = true;
      
      const sunTexture = createSunTexture();
      const bumpMap = createSunBumpMap();
      
      const coreMaterial = new THREE.MeshStandardMaterial({
        color: 0xffaa33,
        map: sunTexture,
        bumpMap: bumpMap,
        emissive: 0xff6600,
        emissiveIntensity: 1.5,
        metalness: 0.9,
        roughness: 0.3,
        bumpScale: 0.12
      });
      
      const core = new THREE.Mesh(
        new THREE.SphereGeometry(1.87, 128, 128),
        coreMaterial
      );
      core.userData = { type: 'sun', material: coreMaterial };
      g.add(core);

      const surfaceDetail = new THREE.Mesh(
        new THREE.SphereGeometry(1.91, 64, 64),
        new THREE.MeshStandardMaterial({ 
          color: 0xffdd88,
          transparent: true,
          opacity: 0.4,
          emissive: 0xffaa44,
          emissiveIntensity: 0.8,
          metalness: 0.8,
          roughness: 0.4,
          side: THREE.FrontSide
        })
      );
      surfaceDetail.renderOrder = 1;
      g.add(surfaceDetail);

      const innerGlow = new THREE.Mesh(
        new THREE.SphereGeometry(2.3, 32, 32),
        new THREE.MeshBasicMaterial({ 
          color: 0xffffaa, 
          transparent: true, 
          opacity: 0.5,
          blending: THREE.AdditiveBlending
        })
      );
      innerGlow.renderOrder = -1;
      innerGlow.userData = { isPulsing: true, baseScale: 1, phase: 0 };
      g.add(innerGlow);
      g.userData.innerGlow = innerGlow;

      const midGlow = new THREE.Mesh(
        new THREE.SphereGeometry(2.98, 32, 32),
        new THREE.MeshBasicMaterial({ 
          color: 0xff8833, 
          transparent: true, 
          opacity: 0.35,
          blending: THREE.AdditiveBlending
        })
      );
      midGlow.renderOrder = -2;
      midGlow.userData = { isPulsing: true, baseScale: 1, phase: 0.3 };
      g.add(midGlow);
      g.userData.midGlow = midGlow;

      const outerGlow = new THREE.Mesh(
        new THREE.SphereGeometry(4.25, 32, 32),
        new THREE.MeshBasicMaterial({ 
          color: 0xff5500, 
          transparent: true, 
          opacity: 0.18,
          blending: THREE.AdditiveBlending
        })
      );
      outerGlow.renderOrder = -3;
      outerGlow.userData = { isPulsing: true, baseScale: 1, phase: 0.6 };
      g.add(outerGlow);
      g.userData.outerGlow = outerGlow;

      const coronaMaterial = new THREE.ShaderMaterial({
        uniforms: {
          time: { value: 0 },
          color1: { value: new THREE.Color(0xff6600) },
          color2: { value: new THREE.Color(0xff3300) },
          color3: { value: new THREE.Color(0xff8800) }
        },
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          uniform float time;
          
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vPosition = position;
            
            float pulse = 1.0 + sin(time * 2.0) * 0.03;
            vec3 pos = position * pulse;
            
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          uniform vec3 color1;
          uniform vec3 color2;
          uniform vec3 color3;
          uniform float time;
          
          void main() {
            float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
            float fresnel = 1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0));
            fresnel = pow(fresnel, 2.5);
            
            float noise = sin(vPosition.x * 10.0 + time) * sin(vPosition.y * 10.0 + time) * 0.1;
            
            vec3 color = mix(color1, color2, fresnel + noise);
            color = mix(color, color3, intensity * 0.5);
            
            float alpha = fresnel * 0.6 + intensity * 0.4;
            alpha *= 0.7 + sin(time * 1.5) * 0.1;
            
            gl_FragColor = vec4(color, alpha);
          }
        `,
        transparent: true,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending
      });
      
      const corona = new THREE.Mesh(
        new THREE.SphereGeometry(5.1, 64, 64),
        coronaMaterial
      );
      corona.renderOrder = -4;
      g.add(corona);
      g.userData.coronaMaterial = coronaMaterial;

      const prominenceParticles = createProminenceParticles();
      g.add(prominenceParticles);
      g.userData.prominenceParticles = prominenceParticles;

      const light = new THREE.PointLight(0xffffcc, 6, 200);
      light.castShadow = true;
      g.add(light);
      g.userData.light = light;
      
      scene.add(new THREE.AmbientLight(0x665544, 0.6));
      
      g.userData.rotationSpeed = 0.002;
      
      return g;
    }
    
    function createProminenceParticles() {
      const particleCount = 180;
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      const velocities = new Float32Array(particleCount * 3);
      const lifetimes = new Float32Array(particleCount);
      const phases = new Float32Array(particleCount);
      
      const color1 = new THREE.Color(0xffff88);
      const color2 = new THREE.Color(0xff6600);
      const color3 = new THREE.Color(0xff3300);
      
      for (let i = 0; i < particleCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 1.87 + Math.random() * 0.43;
        
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        
        const colorChoice = Math.random();
        let c;
        if (colorChoice < 0.4) c = color1.clone();
        else if (colorChoice < 0.75) c = color2.clone();
        else c = color3.clone();
        
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
        
        sizes[i] = Math.random() * 3 + 1;
        
        velocities[i * 3] = (Math.random() - 0.5) * 0.02;
        velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.02;
        velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.02;
        
        lifetimes[i] = Math.random() * 100 + 50;
        phases[i] = Math.random() * Math.PI * 2;
      }
      
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      
      const material = new THREE.ShaderMaterial({
        uniforms: {
          time: { value: 0 },
          pixelRatio: { value: renderer.getPixelRatio() }
        },
        vertexShader: `
          attribute float size;
          attribute vec3 color;
          varying vec3 vColor;
          uniform float time;
          uniform float pixelRatio;
          
          void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * pixelRatio * (200.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          
          void main() {
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;
            
            float alpha = 1.0 - smoothstep(0.2, 0.5, dist);
            gl_FragColor = vec4(vColor, alpha * 0.8);
          }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      
      const particles = new THREE.Points(geometry, material);
      particles.userData = {
        velocities,
        lifetimes,
        phases,
        particleCount,
        basePositions: positions.slice()
      };
      particles.userData.isProminence = true;
      
      return particles;
    }
    
    function createSunBumpMap() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      
      ctx.fillStyle = '#ffcc66';
      ctx.fillRect(0, 0, 256, 256);
      
      for (let i = 0; i < 80; i++) {
        const x = Math.random() * 256;
        const y = Math.random() * 256;
        const radius = Math.random() * 20 + 5;
        const alpha = Math.random() * 0.4 + 0.1;
        
        const spotGradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        spotGradient.addColorStop(0, `rgba(255, 200, 100, ${alpha})`);
        spotGradient.addColorStop(1, 'rgba(255, 150, 50, 0)');
        ctx.fillStyle = spotGradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      for (let i = 0; i < 30; i++) {
        const x1 = Math.random() * 256;

    function createSunTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      
      const centerX = 256;
      const centerY = 256;
      
      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 256);
      gradient.addColorStop(0, '#ffffff');
      gradient.addColorStop(0.15, '#ffffdd');
      gradient.addColorStop(0.35, '#ffffcc');
      gradient.addColorStop(0.5, '#ffdd44');
      gradient.addColorStop(0.7, '#ffaa44');
      gradient.addColorStop(0.9, '#ff8833');
      gradient.addColorStop(1, '#ff6622');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 512, 512);
      
      for (let i = 0; i < 8; i++) {
        const cx = centerX + (Math.random() - 0.5) * 180;
        const cy = centerY + (Math.random() - 0.5) * 180;
        const radius = Math.random() * 30 + 15;
        
        const spotGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        spotGradient.addColorStop(0, 'rgba(150, 100, 50, 0.4)');
        spotGradient.addColorStop(0.5, 'rgba(100, 60, 30, 0.2)');
        spotGradient.addColorStop(1, 'rgba(80, 40, 20, 0)');
        ctx.fillStyle = spotGradient;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      for (let i = 0; i < 120; i++) {
        const x = (Math.random() * 512);
        const y = (Math.random() * 512);
        const radius = Math.random() * 15 + 3;
        const alpha = Math.random() * 0.6 + 0.2;
        
        const spotGradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        spotGradient.addColorStop(0, `rgba(255, 255, 240, ${alpha})`);
        spotGradient.addColorStop(0.5, `rgba(255, 240, 200, ${alpha * 0.5})`);
        spotGradient.addColorStop(1, 'rgba(255, 220, 150, 0)');
        ctx.fillStyle = spotGradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      for (let i = 0; i < 30; i++) {
        const x = (Math.random() * 512);
        const y = (Math.random() * 512);
        const radius = Math.random() * 25 + 8;
        
        const flareGradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        flareGradient.addColorStop(0, 'rgba(255, 230, 180, 0.25)');
        flareGradient.addColorStop(0.5, 'rgba(255, 200, 120, 0.15)');
        flareGradient.addColorStop(1, 'rgba(255, 180, 100, 0)');
        ctx.fillStyle = flareGradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      for (let i = 0; i < 15; i++) {
        const startX = Math.random() * 512;
        const startY = Math.random() * 512;
        const length = Math.random() * 80 + 30;
        const angle = Math.random() * Math.PI * 2;
        
        const endX = startX + Math.cos(angle) * length;
        const endY = startY + Math.sin(angle) * length;
        
        const gradient = ctx.createLinearGradient(startX, startY, endX, endY);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
        gradient.addColorStop(0.3, 'rgba(255, 240, 200, 0.3)');
        gradient.addColorStop(1, 'rgba(255, 220, 150, 0)');
        
        ctx.strokeStyle = gradient;
        ctx.lineWidth = Math.random() * 4 + 1;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
      }
      
      for (let i = 0; i < 8; i++) {
        const cx = centerX + (Math.random() - 0.5) * 200;
        const cy = centerY + (Math.random() - 0.5) * 200;
        const radius = Math.random() * 40 + 20;
        
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 200, 100, 0.15)';
        ctx.lineWidth = Math.random() * 3 + 1;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.3, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 180, 80, 0.1)';
        ctx.lineWidth = Math.random() * 2 + 0.5;
        ctx.stroke();
      }
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      return texture;
    }

    function createOrbitLine(a, b) {
      const curve = new THREE.EllipseCurve(0, 0, a, b, 0, 2 * Math.PI, false, 0);
      const pts = curve.getPoints(150);
      const points = pts.map(p => new THREE.Vector3(p.x, 0, p.y));
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      
      const colors = new Float32Array(150 * 3);
      for (let i = 0; i < 150; i++) {
        const brightness = 0.3 + Math.sin(i * 0.1) * 0.2;
        colors[i * 3] = brightness;
        colors[i * 3 + 1] = brightness * 0.9;
        colors[i * 3 + 2] = brightness * 1.1;
      }
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      
      const mat = new THREE.LineBasicMaterial({ 
        vertexColors: true, 
        transparent: true, 
        opacity: 0.6 
      });
      return new THREE.Line(geo, mat);
    }
    
    function createOrbitParticles(a, b) {
      const particleCount = 50;
      const positions = new Float32Array(particleCount * 3);
      const speeds = new Float32Array(particleCount);
      
      for (let i = 0; i < particleCount; i++) {
        const angle = (i / particleCount) * Math.PI * 2;
        positions[i * 3] = Math.cos(angle) * a;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 0.3;
        positions[i * 3 + 2] = Math.sin(angle) * b;
        speeds[i] = 0.002 + Math.random() * 0.003;
      }
      
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      
      const particleTexture = createStarTexture();
      const mat = new THREE.PointsMaterial({
        size: 0.15,
        color: 0x88aaff,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        map: particleTexture
      });
      
      const particles = new THREE.Points(geo, mat);
      particles.userData.orbitParticles = { 
        a: a, 
        b: b, 
        speeds: speeds,
        positions: positions 
      };
      return particles;
    }

    function createPlanetTexture(baseColor, seed) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      
      const centerX = 128;
      const centerY = 128;
      
      const colorSchemes = [
        { name: 'ocean', light: '#7DD3FC', mid: '#0EA5E9', dark: '#0284C7', accent: '#0369A1' },
        { name: 'sunset', light: '#FCA5A5', mid: '#EF4444', dark: '#DC2626', accent: '#B91C1C' },
        { name: 'lavender', light: '#D8B4FE', mid: '#A855F7', dark: '#9333EA', accent: '#7E22CE' },
        { name: 'forest', light: '#86EFAC', mid: '#22C55E', dark: '#16A34A', accent: '#15803D' },
        { name: 'golden', light: '#FEF3C7', mid: '#F59E0B', dark: '#D97706', accent: '#B45309' },
        { name: 'cyber', light: '#67E8F9', mid: '#06B6D4', dark: '#0891B2', accent: '#0E7490' },
        { name: 'rose', light: '#FBCFE8', mid: '#EC4899', dark: '#DB2777', accent: '#BE185D' },
        { name: 'midnight', light: '#C7D2FE', mid: '#6366F1', dark: '#4F46E5', accent: '#4338CA' }
      ];
      
      const scheme = colorSchemes[seed % colorSchemes.length];
      
      const baseGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 128);
      baseGradient.addColorStop(0, scheme.light);
      baseGradient.addColorStop(0.5, scheme.mid);
      baseGradient.addColorStop(1, scheme.dark);
      ctx.fillStyle = baseGradient;
      ctx.fillRect(0, 0, 256, 256);
      
      const lightGlow = ctx.createRadialGradient(centerX - 30, centerY - 30, 0, centerX, centerY, 80);
      lightGlow.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
      lightGlow.addColorStop(0.3, 'rgba(255, 255, 255, 0.3)');
      lightGlow.addColorStop(0.6, 'rgba(255, 255, 255, 0.1)');
      lightGlow.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = lightGlow;
      ctx.fillRect(0, 0, 256, 256);
      
      const stripeCount = 3 + seed % 2;
      for (let i = 0; i < stripeCount; i++) {
        const stripeY = 40 + (seed * 23 + i * 50) % 180;
        const stripeHeight = 10 + Math.random() * 10;
        
        const stripeGradient = ctx.createLinearGradient(0, stripeY - stripeHeight/2, 0, stripeY + stripeHeight/2);
        stripeGradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
        stripeGradient.addColorStop(0.3, hexToRgba(scheme.light, 0.5));
        stripeGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.4)');
        stripeGradient.addColorStop(0.7, hexToRgba(scheme.light, 0.5));
        stripeGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = stripeGradient;
        ctx.fillRect(0, stripeY - stripeHeight/2, 256, stripeHeight);
      }
      
      const circleCount = 4 + seed % 3;
      for (let i = 0; i < circleCount; i++) {
        const angle = (Math.random() + seed * 0.4) * Math.PI * 2;
        const dist = Math.random() * 60 + 25;
        const circleX = centerX + Math.cos(angle) * dist;
        const circleY = centerY + Math.sin(angle) * dist;
        const circleRadius = Math.random() * 18 + 6;
        
        const circleGradient = ctx.createRadialGradient(circleX, circleY, 0, circleX, circleY, circleRadius);
        circleGradient.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
        circleGradient.addColorStop(0.4, hexToRgba(scheme.light, 0.4));
        circleGradient.addColorStop(0.7, 'rgba(255, 255, 255, 0.15)');
        circleGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = circleGradient;
        ctx.beginPath();
        ctx.arc(circleX, circleY, circleRadius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      const craterCount = 6 + seed % 4;
      for (let i = 0; i < craterCount; i++) {
        const craterX = (Math.random() + seed * 0.17) * 256;
        const craterY = (Math.random() + seed * 0.23) * 256;
        const craterRadius = Math.random() * 8 + 3;
        
        const craterGradient = ctx.createRadialGradient(craterX, craterY, 0, craterX, craterY, craterRadius);
        craterGradient.addColorStop(0, 'rgba(0, 0, 0, 0.1)');
        craterGradient.addColorStop(0.5, 'rgba(0, 0, 0, 0.05)');
        craterGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = craterGradient;
        ctx.beginPath();
        ctx.arc(craterX, craterY, craterRadius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      const edgeGlow = ctx.createRadialGradient(centerX, centerY, 80, centerX, centerY, 128);
      edgeGlow.addColorStop(0, 'rgba(255, 255, 255, 0)');
      edgeGlow.addColorStop(0.6, hexToRgba(scheme.light, 0.2));
      edgeGlow.addColorStop(0.85, hexToRgba(scheme.accent, 0.3));
      edgeGlow.addColorStop(1, hexToRgba(scheme.accent, 0.4));
      ctx.fillStyle = edgeGlow;
      ctx.fillRect(0, 0, 256, 256);
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      return texture;
    }
    
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clearSatellites() {
      if (satelliteGroup) {
        scene.remove(satelliteGroup);
        satelliteGroup.traverse(o => {
          if (o.geometry) o.geometry.dispose();
          if (o.material) {
            if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
            else o.material.dispose();
          }
        });
        satelliteGroup = null;
      }
      connectionLines.forEach(l => {
        scene.remove(l);
        l.geometry.dispose();
        l.material.dispose();
      });
      connectionLines = [];
    }

    function showSatellites(planet) {
      clearSatellites();
      satelliteGroup = new THREE.Group();
      
      const children = planet.data.children || [];
      if (children.length === 0) return;

      const orbitRadius = planet.radius + 1.8;
      const parentColor = planetColorByPercent(scaledModule(planet.data, timePercent / 100).percent);
      
      children.forEach((child, i) => {
        const angle = (i / children.length) * Math.PI * 2;
        const x = Math.cos(angle) * orbitRadius;
        const z = Math.sin(angle) * orbitRadius;
        
        const radius = 0.12 + Math.sqrt(child.required || 1) * 0.05;
        const st = scaledModule(child, timePercent / 100);
        const color = satelliteColorByPercent(st.percent, parentColor);
        
        const geometry = new THREE.SphereGeometry(radius, 24, 24);
        const material = new THREE.MeshPhongMaterial({ 
          color: color,
          emissive: color,
          emissiveIntensity: 0.4,
          shininess: 100
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, 0, z);
        mesh.userData = { type: 'satellite', module: child, orbitAngle: angle, orbitRadius: orbitRadius };
        satelliteGroup.add(mesh);

        const lineGeo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(x, 0, z)
        ]);
        const lineMat = new THREE.LineBasicMaterial({ color: parentColor, transparent: true, opacity: 0.5 });
        const line = new THREE.Line(lineGeo, lineMat);
        satelliteGroup.add(line);
        connectionLines.push(line);
      });
      
      scene.add(satelliteGroup);
      scene.userData.activePlanet = planet;
    }

            <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 6px;">
              <div>
                <div style="font-size: 13px; ${isCompleted ? 'color: #7bed9f;' : ''}">${c.name}</div>
                <div style="font-size: 11px; color: rgba(255,255,255,0.5);">${childSt.earned}/${c.required} 学分</div>
              </div>
              <div style="text-align: right;">
                <div style="font-size: 12px; font-weight: 600; color: ${childSt.percent >= 100 ? '#7bed9f' : childSt.percent > 0 ? '#ff9500' : '#8b3a62'}">${childSt.percent}%</div>
                <div style="height: 4px; width: 60px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 4px;">
                  <div style="height: 100%; width: ${childSt.percent}%; background: ${childSt.percent >= 100 ? '#7bed9f' : childSt.percent > 0 ? '#ff9500' : '#8b3a62'}; border-radius: 2px;"></div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
      
      bodyHtml += '</div>';
      
      $('info-modal-body').innerHTML = bodyHtml;
      $('module-info-modal').classList.add('show');
    }

    function openCourseModal(module) {
      $('modal-title').textContent = `${module.name} - 未修课程`;
      $('modal-body').innerHTML = '<div class="empty-state">加载中...</div>';
      $('course-modal').classList.add('show');
      
      fetch(`/api/recommend_courses/${module.id}`)
        .then(r => r.json())
        .then(data => {
          if (data && data.courses && data.courses.length > 0) {
            $('modal-body').innerHTML = data.courses.map(c => `
              <div class="course-item">
                <div class="course-name">${c.course_code ? c.course_code + ' - ' : ''}${c.name}</div>
                <div class="course-credit">${c.credit} 学分</div>
              </div>
            `).join('');
          } else {
            $('modal-body').innerHTML = '<div class="empty-state">暂无未修课程</div>';
          }
        })
        .catch(() => {
          $('modal-body').innerHTML = '<div class="empty-state">加载失败</div>';
        });
    }

    function resetView() {
      clearSatellites();
      focusedPlanet = null;
      $('back-btn').style.display = 'none';
      closeInfoModal();
      
      const startCameraPos = camera.position.clone();
      const startTarget = controls.target.clone();
      
      new TWEEN.Tween({ cameraX: startCameraPos.x, cameraY: startCameraPos.y, cameraZ: startCameraPos.z, targetX: startTarget.x, targetY: startTarget.y, targetZ: startTarget.z })
        .to({
          cameraX: 12,
          cameraY: 22,
          cameraZ: 28,
          targetX: 0,
          targetY: 0,
          targetZ: 0
        }, 1000)
        .easing(TWEEN.Easing.Cubic.InOut)
        .onUpdate(function(obj) {
          camera.position.set(obj.cameraX, obj.cameraY, obj.cameraZ);
          controls.target.set(obj.targetX, obj.targetY, obj.targetZ);
        })
        .start();
      
      planets.forEach(p => {
        p.mesh.material.opacity = 1;
        p.label.element.style.opacity = '1';
      });
    }

    function focusPlanet(planet) {
      if (focusedPlanet === planet) return;
      
      focusedPlanet = planet;
      $('back-btn').style.display = 'block';
      
      showSatellites(planet);
      
      const targetPos = planet.group.position.clone();
      const offset = new THREE.Vector3(8, 12, 15);
      
      const startCameraPos = camera.position.clone();
      const startTarget = controls.target.clone();
      
      new TWEEN.Tween({ cameraX: startCameraPos.x, cameraY: startCameraPos.y, cameraZ: startCameraPos.z, targetX: startTarget.x, targetY: startTarget.y, targetZ: startTarget.z })
        .to({
          cameraX: targetPos.x + offset.x,
          cameraY: offset.y,
          cameraZ: targetPos.z + offset.z,
          targetX: targetPos.x,
          targetY: targetPos.y,
          targetZ: targetPos.z
        }, 1000)
        .easing(TWEEN.Easing.Cubic.InOut)
        .onUpdate(function(obj) {
          camera.position.set(obj.cameraX, obj.cameraY, obj.cameraZ);
          controls.target.set(obj.targetX, obj.targetY, obj.targetZ);
        })
        .onComplete(function() {
          openModuleInfoModal(planet);
        })
        .start();
      
      planets.forEach(p => {
        if (p === planet) {
          p.mesh.material.opacity = 1;
          p.label.element.style.opacity = '1';
        } else {
          p.mesh.material.opacity = 0.3;
          p.label.element.style.opacity = '0.3';
        }
      });
    }

    function buildModuleButtons() {
      moduleButtons = $('module-buttons');
      moduleButtons.innerHTML = '';
      
      const allBtn = document.createElement('button');
      allBtn.className = 'module-btn active';
      allBtn.textContent = '全部';
      allBtn.onclick = () => {
        resetView();
        document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
      };
      moduleButtons.appendChild(allBtn);
      
      rootModules.forEach((mod, i) => {
        const btn = document.createElement('button');
        btn.className = 'module-btn';
        btn.textContent = mod.name.length > 8 ? `${mod.name.slice(0, 7)}…` : mod.name;
        btn.title = mod.name;
        btn.onclick = () => {
          document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          focusPlanet(planets[i]);
        };
        moduleButtons.appendChild(btn);
      });
    }

    function createPlanets() {
      planets.forEach(p => {
        if (p.group) p.group.traverse(o => {
          if (o.geometry) o.geometry.dispose();
          if (o.material) {
            if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
            else o.material.dispose();
          }
        });
        if (p.orbitLine) { p.orbitLine.geometry.dispose(); p.orbitLine.material.dispose(); }
        if (p.orbitParticles) { p.orbitParticles.geometry.dispose(); p.orbitParticles.material.dispose(); }
      });
      planets.length = 0;

      const scale01 = timePercent / 100;
      const orbitRadii = [7, 9.5, 12, 14.5, 17, 19.5, 22, 24.5];
      
      rootModules.forEach((mod, i) => {
        const orbitA = orbitRadii[i % orbitRadii.length];
        const orbitB = orbitA * 0.92;
        
        const st = scaledModule(mod, scale01);
        const color = planetColorByPercent(st.percent);
        const radius = Math.min(2.5, 0.6 + Math.sqrt(mod.required || 1) * 0.08);

        const group = new THREE.Group();

        const geometry = new THREE.SphereGeometry(radius, 32, 32);
        const texture = createPlanetTexture(color, i);
        const material = new THREE.MeshPhongMaterial({ 
          color: color,
          map: texture,
          emissive: color,
          emissiveIntensity: 0.4,
          shininess: 120,
          transparent: false,
          opacity: 1
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.userData = { type: 'planet', module: mod };
        group.add(mesh);

        const progressRing = createProgressRing(radius, st.percent, color);
        group.add(progressRing);

        const label = createPlanetLabel(mod.name);
        group.add(label);

        const orbitLine = createOrbitLine(orbitA, orbitB);
        const orbitParticles = createOrbitParticles(orbitA, orbitB);

        planets.push({
          group, mesh, progressRing, label, orbitLine, orbitParticles,
          data: mod, radius, orbitA, orbitB,
          angle: (i / rootModules.length) * Math.PI * 2,
          phase: 0,
          speed: 0.025 + (rootModules.length - i) * 0.004,
          scaled: st
        });
      });
    }

    function updateAllProgress(animate) {
      const scale01 = timePercent / 100;
      planets.forEach(p => {
        const s = scaledModule(p.data, scale01);
        p.scaled = s;
        const col = planetColorByPercent(s.percent);
        p.mesh.material.color.setHex(col);
        
        const targetTheta = (s.percent / 100) * Math.PI * 2;
        const geometry = new THREE.RingGeometry(p.radius + 0.3, p.radius + 0.45, 64, 1, -Math.PI / 2, targetTheta);
        p.progressRing.geometry.dispose();
        p.progressRing.geometry = geometry;
        p.progressRing.material.color.setHex(col);
      });
      
      const idx = Math.min(7, Math.floor((timePercent / 100) * 7));
      $('semester-label').textContent = SEMESTER_LABELS[idx];
    }

    function createNebulaTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      
      ctx.fillStyle = '#020308';
      ctx.fillRect(0, 0, 512, 512);
      
      const colors = [
        'rgba(60, 80, 160, 0.12)',
        'rgba(80, 60, 180, 0.1)',
        'rgba(100, 80, 200, 0.08)',
        'rgba(50, 100, 180, 0.1)',
        'rgba(120, 70, 160, 0.08)',
        'rgba(70, 90, 200, 0.09)'
      ];
      
      for (let i = 0; i < 15; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const radius = 80 + Math.random() * 200;
        
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        const color = colors[i % colors.length];
        gradient.addColorStop(0, color);
        gradient.addColorStop(0.5, color.replace('0.1', '0.05').replace('0.12', '0.06').replace('0.08', '0.04').replace('0.09', '0.045'));
        gradient.addColorStop(1, 'rgba(2, 3, 8, 0)');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      for (let i = 0; i < 50; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const radius = 20 + Math.random() * 40;
        
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        gradient.addColorStop(0, 'rgba(100, 120, 220, 0.06)');
        gradient.addColorStop(1, 'rgba(2, 3, 8, 0)');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      return new THREE.CanvasTexture(canvas);
    }

    function initScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020308);
      
      const nebulaTexture = createNebulaTexture();
      const nebulaGeometry = new THREE.SphereGeometry(180, 64, 64);
      const nebulaMaterial = new THREE.MeshBasicMaterial({
        map: nebulaTexture,
        side: THREE.BackSide,
        transparent: true,
        opacity: 1
      });
      const nebula = new THREE.Mesh(nebulaGeometry, nebulaMaterial);
      scene.add(nebula);
      scene.userData.nebula = nebula;

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      const w = container.clientWidth || 800;
      const h = container.clientHeight || 600;
      camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 500);
      camera.position.set(12, 22, 28);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(w, h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      const labelRenderer = new THREE.CSS2DRenderer();
      labelRenderer.setSize(w, h);
      labelRenderer.domElement.style.position = 'absolute';
      labelRenderer.domElement.style.top = '0';
      labelRenderer.domElement.style.pointerEvents = 'none';
      container.appendChild(labelRenderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 8;
      controls.maxDistance = 50;
      controls.minPolarAngle = THREE.MathUtils.degToRad(20);
      controls.maxPolarAngle = THREE.MathUtils.degToRad(70);
      controls.enableRotate = true;
      controls.rotateSpeed = 0.5;
      controls.enablePan = true;
      controls.autoRotate = false;

      starField = createStarField(3000);
      scene.add(starField);

      sunGroup = createSun();
      scene.add(sunGroup);
      scene.userData.sun = sunGroup;

      const planetHolder = new THREE.Group();
      scene.add(planetHolder);
      scene.userData.planetHolder = planetHolder;

      const orbitPlane = new THREE.Group();
      scene.add(orbitPlane);
      scene.userData.orbitPlane = orbitPlane;
    }

    function onPointerMove(e) {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      
      const planetMeshes = planets.map(p => p.mesh);
      const intersects = raycaster.intersectObjects(planetMeshes);

      let hoveredSatellite = null;
      if (satelliteGroup) {
        const satelliteMeshes = [];
        satelliteGroup.traverse(o => {
          if (o.userData?.type === 'satellite') satelliteMeshes.push(o);
        });
        const satIntersects = raycaster.intersectObjects(satelliteMeshes);
        if (satIntersects.length > 0) {
          hoveredSatellite = satIntersects[0].object;
        }
      }

      if (hoveredSatellite) {
        hoveredSatellite.scale.set(1.2, 1.2, 1.2);
        
        tooltip.style.display = 'block';
        tooltip.style.left = e.clientX + 15 + 'px';
        tooltip.style.top = e.clientY + 15 + 'px';
        const satModule = hoveredSatellite.userData.module;
        const st = scaledModule(satModule, timePercent / 100);
        tooltip.innerHTML = `
          <div style="font-weight: 600; margin-bottom: 4px;">${satModule.name}</div>
          <div style="opacity: 0.8; font-size: 11px;">
            已修: ${st.earned} / ${satModule.required} 学分
          </div>
          <div style="opacity: 0.8; font-size: 11px;">完成度: ${st.percent}%</div>
        `;
        
        container.style.cursor = 'pointer';
        
        planets.forEach(p => {
          p.mesh.scale.set(1, 1, 1);
          p.progressRing.visible = false;
        });
        
        satelliteGroup.traverse(o => {
          if (o.userData?.type === 'satellite' && o !== hoveredSatellite) {
            o.scale.set(1, 1, 1);
          }
        });
      } else if (intersects.length > 0) {
        const mesh = intersects[0].object;
        
        if (mesh.userData.type === 'sun') {
          const totalEarned = planets.reduce((sum, p) => sum + p.scaled.earned, 0);
          const totalRequired = planets.reduce((sum, p) => sum + p.data.required, 0);
          const totalPercent = Math.round((totalEarned / totalRequired) * 100);
          
          tooltip.style.display = 'block';
          tooltip.style.left = e.clientX + 15 + 'px';
          tooltip.style.top = e.clientY + 15 + 'px';
          tooltip.innerHTML = `
            <div style="font-weight: 600; margin-bottom: 4px; color: #ffdd44;">☀️ 总学分</div>
            <div style="opacity: 0.8; font-size: 11px;">
              已修: ${totalEarned} / ${totalRequired} 学分
            </div>
            <div style="opacity: 0.8; font-size: 11px;">完成度: ${totalPercent}%</div>
          `;
          
          container.style.cursor = 'pointer';
        } else {
          const planet = planets.find(p => p.mesh === mesh);
          
          mesh.scale.set(1.15, 1.15, 1.15);
          planet.progressRing.visible = true;
          
          tooltip.style.display = 'block';
          tooltip.style.left = e.clientX + 15 + 'px';
          tooltip.style.top = e.clientY + 15 + 'px';
          tooltip.innerHTML = `
            <div style="font-weight: 600; margin-bottom: 4px;">${planet.data.name}</div>
            <div style="opacity: 0.8; font-size: 11px;">
              已修: ${planet.scaled.earned} / ${planet.data.required} 学分
            </div>
            <div style="opacity: 0.8; font-size: 11px;">完成度: ${planet.scaled.percent}%</div>
          `;
          
          container.style.cursor = 'pointer';
          
          planets.forEach(p => {
            if (p.mesh !== mesh) {
              p.mesh.scale.set(1, 1, 1);
              p.progressRing.visible = false;
            }
          });
        }
      } else {
        planets.forEach(p => {
          p.mesh.scale.set(1, 1, 1);
          p.progressRing.visible = false;
        });
        
        if (satelliteGroup) {
          satelliteGroup.traverse(o => {
            if (o.userData?.type === 'satellite') {
              o.scale.set(1, 1, 1);
            }
          });
        }
        
        tooltip.style.display = 'none';
        container.style.cursor = 'default';
      }
    }

    function onClick(e) {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      
      if (satelliteGroup) {
        const satelliteMeshes = [];
        satelliteGroup.traverse(o => {
          if (o.userData?.type === 'satellite') satelliteMeshes.push(o);
        });
        const satelliteIntersects = raycaster.intersectObjects(satelliteMeshes);
        
        if (satelliteIntersects.length > 0) {
          const mesh = satelliteIntersects[0].object;
          openCourseModal(mesh.userData.module);
          return;
        }
      }

      const planetMeshes = planets.map(p => p.mesh);
      const planetIntersects = raycaster.intersectObjects(planetMeshes);
      
      if (planetIntersects.length > 0) {
        const mesh = planetIntersects[0].object;
        const planet = planets.find(p => p.mesh === mesh);
        focusPlanet(planet);
      }
    }

    function onResize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }

    function hideLoading() {
      setTimeout(() => {
        $('loading-screen')?.classList.add('hidden');
      }, 300);
    }

    function showError() {
      $('loading-screen').innerHTML = `
        <div style="color: #fff; text-align: center;">
          <div style="font-size: 18px; margin-bottom: 10px;">加载失败</div>
          <div style="font-size: 12px; opacity: 0.7; margin-bottom: 15px;">无法获取学分数据</div>
          <button onclick="loadData()" style="padding: 8px 20px; background: #4d6cf0; border: none; border-radius: 8px; color: #fff; cursor: pointer;">重试</button>
        </div>
      `;
    }

    function init(data) {
      if (data.sun) sunData = data.sun;
      buildModuleMaps(data.modules || []);

      initScene();
      createPlanets();

      const planetHolder = scene.userData.planetHolder;
      const orbitPlane = scene.userData.orbitPlane;
      planets.forEach(p => {
        planetHolder.add(p.group);
        orbitPlane.add(p.orbitLine);
        orbitPlane.add(p.orbitParticles);
      });

      buildModuleButtons();

      container.addEventListener('pointermove', onPointerMove);
      container.addEventListener('click', onClick);
      $('back-btn').addEventListener('click', resetView);
      window.addEventListener('resize', onResize);
      
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'timeScale') {
          timePercent = e.data.scale;
          updateAllProgress(true);
        }
      });

      hideLoading();
      animate();

      if (!rootModules.length) {
        const empty = document.createElement('div');
        empty.textContent = '暂无培养方案模块数据';
        empty.style.cssText = `
          position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
          color: #fff; font-size: 16px; opacity: 0.7;
        `;
        container.appendChild(empty);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      animationTime += 0.016;

      TWEEN.update();
      controls.update();

      if (scene.userData.nebula) {
        scene.userData.nebula.rotation.y += 0.0003;
        scene.userData.nebula.rotation.x += 0.0001;
      }

      if (starField && starField.userData.isStarField) {
        starField.children.forEach(layer => {
          if (layer.userData.starData) {
            const colors = layer.geometry.attributes.color.array;
            const phases = layer.userData.starData.phases;
            const speeds = layer.userData.starData.speeds;
            
            for (let i = 0; i < phases.length; i++) {
              const alpha = 0.4 + 0.6 * Math.sin(animationTime * speeds[i] + phases[i]);
              colors[i * 3] *= alpha;
              colors[i * 3 + 1] *= alpha;
              colors[i * 3 + 2] *= alpha;
            }
            layer.geometry.attributes.color.needsUpdate = true;
          }
        });
        
        starField.rotation.y += 0.0002;
      }

      const planetHolder = scene.userData.planetHolder;
      planets.forEach(p => {
        p.angle += p.speed * 0.016;
        const x = Math.cos(p.angle) * p.orbitA;
        const z = Math.sin(p.angle) * p.orbitB;
        p.group.position.set(x, 0, z);
        p.group.rotation.y += 0.003;
        
        if (p.orbitParticles && p.orbitParticles.userData.orbitParticles) {
          const particlesData = p.orbitParticles.userData.orbitParticles;
          const positions = p.orbitParticles.geometry.attributes.position.array;
          const a = particlesData.a;
          const b = particlesData.b;
          const speeds = particlesData.speeds;
          
          for (let i = 0; i < speeds.length; i++) {
            const angle = (i / speeds.length) * Math.PI * 2 + animationTime * speeds[i];
            positions[i * 3] = Math.cos(angle) * a;
            positions[i * 3 + 1] = Math.sin(animationTime * 2 + i * 0.5) * 0.15;
            positions[i * 3 + 2] = Math.sin(angle) * b;
          }
          p.orbitParticles.geometry.attributes.position.needsUpdate = true;
        }
      });

      if (satelliteGroup && scene.userData.activePlanet) {
        const activePlanet = scene.userData.activePlanet;
        satelliteGroup.position.copy(activePlanet.group.position);
        satelliteGroup.rotation.y += 0.005;
        
        satelliteGroup.traverse(o => {
          if (o.userData?.type === 'satellite') {
            const angle = o.userData.orbitAngle + animationTime * 0.003;
            const orbitRadius = o.userData.orbitRadius;
            o.position.x = Math.cos(angle) * orbitRadius;
            o.position.z = Math.sin(angle) * orbitRadius;
            o.position.y = Math.sin(animationTime * 2 + o.userData.orbitAngle) * 0.1;
          }
        });
      }

      if (scene.userData.sun) {
        const sunGroup = scene.userData.sun;
        
        if (sunGroup.userData.rotationSpeed) {
          sunGroup.rotation.y += sunGroup.userData.rotationSpeed;
        }
        
        if (sunGroup.userData.coronaMaterial) {
          sunGroup.userData.coronaMaterial.uniforms.time.value = animationTime;
        }
        
        if (sunGroup.userData.innerGlow) {
          const innerGlow = sunGroup.userData.innerGlow;
          const pulse = 1 + Math.sin(animationTime * 1.5) * 0.05;
          innerGlow.scale.set(pulse, pulse, pulse);
        }
        
        if (sunGroup.userData.midGlow) {
          const midGlow = sunGroup.userData.midGlow;
          const pulse = 1 + Math.sin(animationTime * 1.2 + 0.5) * 0.04;
          midGlow.scale.set(pulse, pulse, pulse);
        }
        
        if (sunGroup.userData.outerGlow) {
          const outerGlow = sunGroup.userData.outerGlow;
          const pulse = 1 + Math.sin(animationTime * 0.8 + 1) * 0.03;
          outerGlow.scale.set(pulse, pulse, pulse);
        }
        
        if (sunGroup.userData.prominenceParticles) {
          const particles = sunGroup.userData.prominenceParticles;
          const positions = particles.geometry.attributes.position.array;
          const basePositions = particles.userData.basePositions;
          const velocities = particles.userData.velocities;
          const lifetimes = particles.userData.lifetimes;
          const phases = particles.userData.phases;
          const particleCount = particles.userData.particleCount;
          
          for (let i = 0; i < particleCount; i++) {
            const lifetime = lifetimes[i];
            const phase = phases[i];
            const t = (animationTime * 0.5 + phase) % lifetime;
            const factor = Math.sin(t / lifetime * Math.PI);
            
            positions[i * 3] = basePositions[i * 3] + velocities[i * 3] * t * factor * 10;
            positions[i * 3 + 1] = basePositions[i * 3 + 1] + velocities[i * 3 + 1] * t * factor * 10;
            positions[i * 3 + 2] = basePositions[i * 3 + 2] + velocities[i * 3 + 2] * t * factor * 10;
          }
          particles.geometry.attributes.position.needsUpdate = true;
        }
      }

      renderer.render(scene, camera);
    }

    let dataReceived = false;

    function loadData() {
      console.log('loadData called');
      container = document.getElementById('container');
      tooltip = document.getElementById('solar-tooltip');
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.remove('hidden');
      }
      
      window.addEventListener('message', handleMessage);
      
      setTimeout(() => {
        if (!dataReceived) {
          console.log('No message received, fetching directly');
          window.removeEventListener('message', handleMessage);
          fetchDataDirectly();
        }
      }, 2000);
    }

    function handleMessage(e) {
      if (e.data && e.data.type === 'creditData' && e.data.data) {
        dataReceived = true;
        window.removeEventListener('message', handleMessage);
        init(e.data.data);
      }
      if (e.data && e.data.type === 'timeScale') {
        timePercent = e.data.scale;
        updateAllProgress(true);
      }
    }

    function fetchDataDirectly() {
      console.log('fetchDataDirectly called');
      fetch('/api/progress_data', {
        credentials: 'same-origin'
      })
        .then(r => {
          console.log('Response received:', r.status);
          if (r.status === 401) {
            console.log('Not logged in, showing login message');
            showLoginError();
            return null;
          }
          return r.json();
        })
        .then(data => {
          if (data && data.modules) {
            console.log('Data received:', data);
            init(data);
          } else if (data !== null) {
            console.log('Invalid data received');
            showError();
          }
        })
        .catch(err => {
          console.error('Fetch error:', err);
          showError();
        });
    }
    
    function showLoginError() {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.innerHTML = `
          <div style="color: #fff; text-align: center;">
            <div style="font-size: 18px; margin-bottom: 10px;">请先登录</div>
            <div style="font-size: 12px; opacity: 0.7; margin-bottom: 15px;">请在主页面登录后刷新此页面</div>
            <button onclick="window.location.reload()" style="padding: 8px 20px; background: #4d6cf0; border: none; border-radius: 8px; color: #fff; cursor: pointer;">刷新页面</button>
          </div>
        `;
      }
    }

    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
